<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<title>RDG Business Holding</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#2F3A40;
    --bg-dark:#252F35;
    --white:#F5F5F5;
    --muted:#D5D5D5;
}

body{
    font-family:'Inter',sans-serif;
    background:linear-gradient(135deg,#2F3A40,#252F35,#1F272C);
    color:white;
    overflow-x:hidden;
}

/* BACKGROUND */

.gradient-bg{
    position:fixed;
    inset:0;
    z-index:-3;
    background:
    radial-gradient(circle at top left, rgba(255,255,255,0.03), transparent 35%),
    radial-gradient(circle at bottom right, rgba(255,255,255,0.02), transparent 35%),
    linear-gradient(135deg,#2F3A40,#252F35,#1F272C);
}

/* NAVBAR */

nav{
    position:sticky;
    top:0;
    z-index:999;
    padding:1rem 2rem;
    background:rgba(37,47,53,0.88);
    backdrop-filter:blur(20px);
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.nav-container{
    max-width:1400px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* LOGO AREA */

.logo{
    display:flex;
    align-items:center;
    text-decoration:none;
}

.logo-img{
    height:88px;
    width:auto;
    object-fit:contain;
    display:block;
    transition:0.4s ease;

    filter:
    brightness(1.1)
    drop-shadow(0 0 12px rgba(255,255,255,0.15));
}

.logo-img:hover{
    transform:scale(1.05);
}

/* NAV LINKS */

.nav-links{
    display:flex;
    align-items:center;
    gap:2rem;
    list-style:none;
}

.nav-links a{
    text-decoration:none;
    color:rgba(255,255,255,0.75);
    font-size:0.95rem;
    font-weight:500;
    transition:0.3s ease;
}

.nav-links a:hover,
.nav-links a.active{
    color:white;
}

.quote-btn{
    background:#F2F2F2;
    color:#2F3A40 !important;
    padding:0.8rem 1.6rem;
    border-radius:50px;
    font-weight:700 !important;
}

.menu-icon{
    display:none;
    color:white;
    font-size:1.6rem;
    cursor:pointer;
}

/* HERO */

.hero-slider{
    position:relative;
    height:92vh;
    overflow:hidden;
}

.slide{
    position:absolute;
    inset:0;
    opacity:0;
    transition:1s ease;
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

.slide.active{
    opacity:1;
    z-index:2;
}

.slide::before{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(
        135deg,
        rgba(0,0,0,0.68),
        rgba(0,0,0,0.45)
    );
}

.slide-content{
    position:relative;
    z-index:5;
    max-width:900px;
    padding:2rem;
}

.slide-content h1{
    font-size:4.7rem;
    font-weight:800;
    margin-bottom:1.2rem;
    letter-spacing:-2px;
}

.slide-content p{
    font-size:1.2rem;
    color:rgba(255,255,255,0.82);
    max-width:700px;
    margin:auto auto 2rem;
    line-height:1.8;
}

/* BUTTON */

.btn-primary{
    background:#F2F2F2;
    color:#2F3A40;
    padding:1rem 2.5rem;
    border-radius:60px;
    font-weight:700;
    text-decoration:none;
    display:inline-block;
    transition:0.35s ease;
}

.btn-primary:hover{
    transform:translateY(-4px);
    background:white;
}

/* DOTS */

.dot-container{
    position:absolute;
    bottom:35px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:14px;
    z-index:10;
}

.dot{
    width:12px;
    height:12px;
    border-radius:50%;
    background:rgba(255,255,255,0.35);
    cursor:pointer;
    transition:0.3s ease;
}

.dot.active{
    background:#FFFFFF;
    width:34px;
    border-radius:50px;
}

/* SECTIONS */

.container{
    max-width:1400px;
    margin:auto;
    padding:6rem 2rem;
}

.section-title{
    text-align:center;
    font-size:3rem;
    font-weight:800;
    margin-bottom:1rem;
    color:white;
}

.section-subtitle{
    text-align:center;
    color:#C6CED3;
    margin-bottom:4rem;
    font-size:1.1rem;
}

/* BUSINESS GRID */

.business-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:2rem;
}

.business-card{
    background:rgba(55,67,74,0.82);
    border:1px solid rgba(255,255,255,0.06);
    border-radius:34px;
    padding:2.5rem;
    transition:0.4s ease;
    text-decoration:none;
    color:white;
}

.business-card:hover{
    transform:translateY(-10px);
    background:#415059;
}

.card-icon{
    font-size:3rem;
    margin-bottom:1.5rem;
    color:#F1F1F1;
}

.business-card h3{
    font-size:1.9rem;
    margin-bottom:1rem;
}

.business-card p{
    color:rgba(255,255,255,0.72);
    line-height:1.8;
}

.card-tag{
    display:inline-block;
    margin-top:1.4rem;
    background:rgba(255,255,255,0.08);
    padding:0.45rem 1.2rem;
    border-radius:50px;
    font-size:0.85rem;
    color:white;
}

/* FOOTER */

footer{
    background:#20282D;
    padding:5rem 2rem 2rem;
    border-top:1px solid rgba(255,255,255,0.05);
}

.footer-grid{
    max-width:1400px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:3rem;
}

.footer-col h4{
    margin-bottom:1.3rem;
    font-size:1.2rem;
}

.footer-col p,
.footer-col a{
    color:rgba(255,255,255,0.65);
    margin-bottom:0.8rem;
    text-decoration:none;
    display:block;
}

.copyright{
    margin-top:4rem;
    text-align:center;
    color:rgba(255,255,255,0.45);
}

/* MOBILE */

@media(max-width:980px){

    .business-grid{
        grid-template-columns:repeat(2,1fr);
    }

    .slide-content h1{
        font-size:3.3rem;
    }

}

@media(max-width:780px){

    .menu-icon{
        display:block;
    }

    .nav-links{
        position:absolute;
        top:110px;
        left:20px;
        right:20px;
        background:#2B353B;
        border-radius:28px;
        padding:2rem;
        display:none;
        flex-direction:column;
        text-align:center;
    }

    .nav-links.active{
        display:flex;
    }

    .business-grid{
        grid-template-columns:1fr;
    }

    .logo-img{
        height:70px;
    }

    .slide-content h1{
        font-size:2.4rem;
    }

}

@media(max-width:480px){

    .slide-content h1{
        font-size:2rem;
    }

    .slide-content p{
        font-size:1rem;
    }

}

</style>
</head>

<body>

<div class="gradient-bg"></div>

<!-- NAVBAR -->

<nav>
<div class="nav-container">

<a href="#" class="logo">
    <img src="logo1.JPG" alt="RDG Logo" class="logo-img">
</a>

<div class="menu-icon" id="menuIcon">
<i class="fas fa-bars"></i>
</div>

<ul class="nav-links" id="navLinks">
<li><a href="#" class="active">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Construction</a></li>
<li><a href="#">Import</a></li>
<li><a href="#">Coffee</a></li>
<li><a href="#">Portfolio</a></li>
<li><a href="#" class="quote-btn">Get Quote</a></li>
</ul>

</div>
</nav>

<!-- HERO (UNCHANGED) -->
<div class="hero-slider">
<!-- same slides as your original -->
</div>

<script>
const menuIcon = document.getElementById('menuIcon');
const navLinks = document.getElementById('navLinks');

menuIcon.addEventListener('click',()=>{
    navLinks.classList.toggle('active');
});
</script>

</body>
</html>
